version: "3.9"

services:
  app:
    build: .
    container_name: hospital_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env.dev
    # restart: always
    networks:
      - app_net

  db:
    image: postgres:15
    container_name: postgres_db
    # restart: always
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_new:/var/lib/postgresql/data
    networks:
      - app_net

  # nginx:
  #   image: nginx:latest
  #   container_name: nginx_proxy
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - app
  #   restart: always
  #   networks:
  #     - app_net

volumes:
  postgres_data_new:

networks:
  app_net:
